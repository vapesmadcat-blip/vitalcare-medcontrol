name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências
        run: npm install

      - name: Inicializar Capacitor
        run: npx cap init "VitalCare MedControl" com.vitalcare.medcontrol --web-dir=www

      - name: Criar projeto Android
        run: npx cap add android

      - name: Copiar código nativo
        run: |
          mkdir -p android/app/src/main/java/com/vitalcare/medcontrol
          cp -r native/android/app/src/main/java/com/vitalcare/medcontrol/* android/app/src/main/java/com/vitalcare/medcontrol/

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Permitir Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK
        run: cd android && ./gradlew assembleDebug

      - name: Enviar APK
        uses: actions/upload-artifact@v4
        with:
          name: VitalCare-MedControl-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk          path: android/app/build/outputs/apk/debug/app-debug.apk
